name: Create Skill Tags

on:
  push:
    branches: [main]

jobs:
  tag-skill-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed skill directories
        id: changed
        run: |
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git hash-object -t tree /dev/null)
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'skills/**' || echo '')
          if [ -z "$CHANGED" ]; then
            echo "No skill changes detected. Exiting."
            echo "skills=" >> "$GITHUB_OUTPUT"
            echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
            echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SKILLS=()
          while IFS= read -r file; do
            case "$file" in
              skills/*/*)
                skill=$(printf '%s\n' "$file" | cut -d/ -f2)
                SKILLS+=("$skill")
                ;;
            esac
          done <<< "$CHANGED"
          UNIQUE_SKILLS=$(printf "%s\n" "${SKILLS[@]}" | sort -u | tr '\n' ' ')
          echo "skills=$UNIQUE_SKILLS" >> "$GITHUB_OUTPUT"
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Create tags from skill versions
        id: tags
        run: |
          extract_version() {
            sed -n '/^---$/,/^---$/p' |
            sed '1d;$d' |
            yq -r '.metadata.version // ""'
          }

          TAGS=()
          for skill in ${{ steps.changed.outputs.skills }}; do
            SKILL_MD="skills/$skill/SKILL.md"
            if [ ! -f "$SKILL_MD" ]; then
              echo "SKILL.md not found for $skill – skipping"
              continue
            fi

            HEAD_VERSION=$(extract_version < "$SKILL_MD")
            if [ -z "$HEAD_VERSION" ]; then
              echo "Version not found in $SKILL_MD"
              exit 1
            fi
            if ! printf '%s\n' "$HEAD_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Invalid version '$HEAD_VERSION' in $SKILL_MD"
              exit 1
            fi

            BASE_VERSION=""
            if git cat-file -e "${{ steps.changed.outputs.base_sha }}:$SKILL_MD" 2>/dev/null; then
              BASE_VERSION=$(git show "${{ steps.changed.outputs.base_sha }}:$SKILL_MD" | extract_version)
              if [ -n "$BASE_VERSION" ] && ! printf '%s\n' "$BASE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                echo "Invalid version '$BASE_VERSION' in $SKILL_MD at ${{ steps.changed.outputs.base_sha }}"
                exit 1
              fi
            fi

            if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
              echo "Version unchanged for $skill – skipping"
              continue
            fi

            TAG="skills/${skill}/v${HEAD_VERSION}"
            TAGS+=("$TAG")
          done
          echo "tags=${TAGS[*]}" >> "$GITHUB_OUTPUT"

      - name: Push tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          for tag in ${{ steps.tags.outputs.tags }}; do
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Tag $tag already exists locally"
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists on origin"
              exit 1
            fi
            git tag -a "$tag" "${{ steps.changed.outputs.head_sha }}" -m "Release $tag"
            git push origin "refs/tags/$tag"
          done
